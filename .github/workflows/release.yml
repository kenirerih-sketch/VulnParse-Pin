name: Release - Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to release (for example v1.2.0)
        required: true
        type: string
      enable_rebuild_gate:
        description: Enable optional clean rebuild verification gate
        required: false
        default: false
        type: boolean


permissions:
  contents: write
  id-token: write

jobs:
  validation-gate:
    name: Release validation gate
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Validate tag, changelog cut, and version alignment
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)?$ ]]; then
            echo "Tag must be semantic version style, got: $RELEASE_TAG"
            exit 1
          fi

          RELEASE_VERSION="${RELEASE_TAG#v}"
          echo "Validating release cut for ${RELEASE_VERSION}"

          if ! grep -q "^## \[${RELEASE_VERSION}\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a cut for ${RELEASE_VERSION}"
            exit 1
          fi

          if ! grep -q "^## \[Unreleased\]" CHANGELOG.md; then
            echo "CHANGELOG.md must keep an Unreleased section"
            exit 1
          fi

          unreleased_line="$(grep -n "^## \[Unreleased\]" CHANGELOG.md | head -n1 | cut -d: -f1)"
          release_line="$(grep -n "^## \[${RELEASE_VERSION}\]" CHANGELOG.md | head -n1 | cut -d: -f1)"

          if [[ -z "$unreleased_line" || -z "$release_line" || "$unreleased_line" -ge "$release_line" ]]; then
            echo "Unreleased must appear before the current release section"
            exit 1
          fi

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          release_version = release_tag[1:]
          init_text = Path("src/vulnparse_pin/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', init_text)
          if not match:
              raise SystemExit("Could not find __version__ in src/vulnparse_pin/__init__.py")
          package_version = match.group(1)
          if package_version != release_version:
              raise SystemExit(
                  f"Version mismatch: tag={release_version} package={package_version}"
              )
          print(f"Version alignment OK: {package_version}")
          PY

      - name: Install project with test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run release validation test gate
        run: |
          pytest -q \
            tests/test_pass_contracts.py \
            tests/test_parser_smoke.py \
            tests/test_cli_flags_matrix.py

  build:
    name: Build release artifacts
    needs: validation-gate
    uses: ./.github/workflows/re_build.yml
    with:
      python-version: "3.14"
      enable_rebuild_gate: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_rebuild_gate || false }}
    secrets: inherit

  finalize-release:
    name: Generate SBOM, checksums, and publish github release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Ensure Tag is on main
        run: |
          git fetch --tags origin main
          TAG_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"
          if [[ -z "$TAG_SHA" ]]; then
            echo "Could not resolve tag commit for $RELEASE_TAG"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "Tag is not on main branch"
            exit 1
          fi

      - name: Download Python distributions
        uses: actions/download-artifact@v8.0.0
        with:
          name: python-dist
          path: dist

      - name: Download Binaries
        uses: actions/download-artifact@v8.0.0
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install SBOM tool
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-py

      - name: Generate CycloneDX SBOM from Python reqs
        run: |
          cyclonedx-py environment > dist/vulnparse-pin-sbom.json

      - name: Install GPG
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gnupg

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          find . -type f \
          ! -name "SHA256SUMS" \
          ! -name "*.asc" \
          -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Import GPG Key
        if: env.GPG_PRIVATE_KEY != ''
        run: |
          printf '%b' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign SHA256SUMS
        if: env.GPG_PRIVATE_KEY != '' && env.GPG_PASSPHRASE != ''
        working-directory: dist
        run: |
          gpg --batch --yes \
          --pinentry-mode loopback \
          --passphrase "$GPG_PASSPHRASE" \
          --armor --detach-sign SHA256SUMS

      - name: Publish Github Release
        uses: softprops/action-gh-release@v2.4.0
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          make_latest: "true"
          files: |
            dist/*
        
  publish-pypi:
    name: Publish python distributions to pypi
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v8.0.0
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPi via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1.13
        with:
          verbose: true
