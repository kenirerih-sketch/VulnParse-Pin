name: Release Build and Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  python-packages:
    name: Build Python Package (sdist+wheel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  binaries:
    name: Build Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and pyinstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build single-file binary
        run: |
          pyinstaller --name vpp --onefile src/vulnparse_pin/__main__.py

      - name: Rename binary with OS and arch (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCH="${{ runner.arch }}"
          OS="${{ runner.os }}"
          mv dist/vpp "dist/vpp-${OS}-${ARCH}"

      - name: Rename binary with OS and arch (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $arch = "${{ runner.arch }}"
          $os = "${{ runner.os }}"
          Move-Item "dist/vpp.exe" "dist/vpp-${os}-${arch}.exe"

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: dist/*

  publish-release-assets:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: [python-packages, binaries]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: release-assets

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-ubuntu-latest
          path: release-assets

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: binary-windows-latest
          path: release-assets

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: binary-macos-latest
          path: release-assets

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
