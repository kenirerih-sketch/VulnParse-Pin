name: Release - Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'


permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build release artifacts
    uses: ./.github/workflows/re_build.yml
    with:
      python-version: "3.14"
    secrets: inherit

  finalize-release:
    name: Generate SBOM, checksums, and publish github release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Download Python distributions
        uses: actions/download-artifact@v8.0.0
        with:
          name: python-dist
          path: dist

      - name: Download Binaries
        uses: actions/download-artifact@v8.0.0
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install SBOM tool
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-py

      - name: Generate CycloneDX SBOM from Python reqs
        run: |
          mkdir -p dist/sbom
          cyclonedx-py environment > dist/sbom/vulnparse-pin-sbom.json

      - name: Install GPG
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gnupg

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          find . -type f \
          ! -name "SHA256SUMS" \
          ! -name "*.asc" \
          -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Import GPG Key
        if: env.GPG_PRIVATE_KEY != ''
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign SHA256SUMS
        if: env.GPG_PRIVATE_KEY != '' && env.GPG_PASSPHRASE != ''
        working-directory: dist
        run: |
          gpg --batch --yes \
          --pinentry-mode loopback \
          --passphrase "$GPG_PASSPHRASE" \
          --armor --detach-sign SHA256SUMS

      - name: Publish Github Release
        uses: softprops/action-gh-release@v2.4.0
        with:
          generate_release_notes: true
          make_latest: "true"
          files: |
            dist/*
            dist/sbom/vulnparse-pin-sbom.json
        
  publish-pypi:
    name: Publish python distributions to pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v8.0.0
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPi via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1.13
        with:
          verbose: true
          attestations: false
